<!-- نوار ناوبری اصلی (Navbar) بالای صفحه -->
<header style="background-color: #3f51b5; padding: 15px; color: white; direction: rtl;">
  <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
    <h1 style="margin: 0; font-size: 1.5rem;">فروشگاه آنلاین</h1>

    <nav style="display: flex; gap: 20px;">
      <a routerLink="/products"
         routerLinkActive="active-link"
         [routerLinkActiveOptions]="{exact: true}"
         style="color: white; text-decoration: none; font-weight: bold;">
        محصولات
      </a>
      <a routerLink="/products/new"
         routerLinkActive="active-link"
         style="color: white; text-decoration: none; font-weight: bold;">
        ثبت محصول جدید
      </a>
      <a routerLink="/categories"
         routerLinkActive="active-link"
         [routerLinkActiveOptions]="{exact: true}"
         style="color: white; text-decoration: none; font-weight: bold;">
        دسته‌بندی‌ها
      </a>
      <a routerLink="/categories/new"
         routerLinkActive="active-link"
         style="color: white; text-decoration: none; font-weight: bold;">
        ثبت دسته‌بندی جدید
      </a>
    </nav>
  </div>
</header>

<!-- محل نمایش کامپوننت‌های روت در بدنه صفحه -->
<main style="max-width: 1200px; margin: 20px auto; padding: 0 15px; min-height: 80vh;">
  <router-outlet></router-outlet>
</main>

<footer style="text-align: center; padding: 20px; background-color: #f5f5f5; border-top: 1px solid #ddd; margin-top: 40px; direction: rtl;">
  <p>© 2026 پنل مدیریت فروشگاه. تمامی حقوق محفوظ است.</p>
</footer>
